services:
  - type: web
    name: takatak-backend
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_JWKS_URL
        sync: false
      - key: UPMIND_WEBHOOK_SECRET
        sync: false
      - key: AUTOMATION_WEBHOOK_SECRET
        sync: false
      - key: PORTAL_SIGNING_SECRET
        sync: false
      - key: PORTAL_LAUNCH_TTL_SECONDS
        value: "120"
      - key: QMAPS_PORTAL_BASE_URL
        sync: false
      - key: FLEXS_PORTAL_BASE_URL
        sync: false
      - key: SOCIAL_PORTAL_BASE_URL
        sync: false
      - key: VOIP_PORTAL_BASE_URL
        sync: false
      - key: MARKETING_PORTAL_BASE_URL
        sync: false
      - key: MARKETPLACE_PORTAL_BASE_URL
        sync: false
      - key: LOVABLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://takatak.ca,https://app.takatak.ca,https://*.lovable.app"
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: takatak-ai-intake-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run worker:ai-intake
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: LOVABLE_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: WORKER_POLL_MS
        value: "5000"
      - key: WORKER_BATCH
        value: "5"
      - key: WORKER_MAX_ATTEMPTS
        value: "5"
      - key: WORKER_STUCK_MS
        value: "600000"

  - type: worker
    name: takatak-payout-sweep-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run worker:payout
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: WORKER_POLL_MS
        value: "30000"
      - key: PAYOUT_PROVIDER
        value: none
      - key: PAYOUT_GRACE_PERIOD_HOURS
        value: "72"
      - key: STRIPE_CONNECT_ENABLED
        value: "false"

  - type: worker
    name: takatak-notification-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run worker:notifications
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: WORKER_POLL_MS
        value: "60000"
      - key: ADMIN_NOTIFICATION_USER_ID
        sync: false
      - key: EMAIL_PROVIDER
        value: none
      - key: APP_BASE_URL
        value: https://takatak.ca

databases:
  - name: takatak-db
    plan: starter
    region: oregon

# After first deploy:
# 1. Provision the Postgres DB (link it to the web service so DATABASE_URL is wired).
# 2. Fill the secrets marked sync:false in the Render dashboard.
# 3. Worker services use npm scripts: worker:ai-intake, worker:payout, worker:notifications.
