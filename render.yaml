# TAKATAK — Render deployment
#
# IMPORTANT: This project does NOT use MongoDB and does NOT have a root index.js.
# Frontend entry: start.mjs  (Node 20+, binds to process.env.PORT)
# Backend entry:  backend/dist/server.js  (Express + Prisma/Postgres)
#
# If a Render service is crashing with `node index.js` + MongoDB DNS errors,
# the service was created from an older project. Update its Build / Start
# commands to match the values below, or delete and recreate from this file.

services:
  - type: web
    name: takatak-frontend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node start.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"

  - type: web
    name: takatak-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: takatak-postgres
          property: connectionString
      - key: AUTH_JWT_SECRET
        sync: false

  - type: worker
    name: takatak-payout-worker
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/workers/payoutSweepWorker.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: takatak-postgres
          property: connectionString

  - type: worker
    name: takatak-notification-worker
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/workers/notificationWorker.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: takatak-postgres
          property: connectionString

databases:
  - name: takatak-postgres
    plan: starter
    postgresMajorVersion: 16